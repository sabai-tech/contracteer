openapi: 3.0.0
info:
  title: Test API
  version: '1.0'
servers:
  - url: 'http://localhost:3000'
paths:
  /upload:
    post:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: string
      responses:
        100:
          description: Continue
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        200:
          description: Upload complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
