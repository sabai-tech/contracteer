openapi: 3.0.0
info:
  title: Test API
  version: '1.0'
servers:
  - url: 'http://localhost:3000'
paths:
  /resources/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    delete:
      responses:
        204:
          description: Resource deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
