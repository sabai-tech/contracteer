openapi: 3.0.0
info:
  title: Test API
  version: '1.0'
servers:
  - url: 'http://localhost:3000'
paths:
  /resources/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    get:
      responses:
        200:
          description: Resource details
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
        304:
          description: Not modified
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
