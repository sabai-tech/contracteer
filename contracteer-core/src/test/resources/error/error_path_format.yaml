openapi: 3.0.0
info:
  title: Error Path Format Test API
  version: '1.0'
servers:
  - url: 'http://localhost:3000'
paths:
  /users/{id}:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: filter
          style: deepObject
          explode: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: user created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
components:
  schemas:
    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
          minLength: 1
          maxLength: 0
    UserResponse:
      type: object
      properties:
        id:
          type: integer
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
    Tag:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 0
