openapi: 3.0.0
info:
  title: Array Constraints Test
  version: '1.0'
paths:
  /test:
    get:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                with_min:
                  type: array
                  items:
                    type: string
                  minItems: 1
                with_max:
                  type: array
                  items:
                    type: string
                  maxItems: 10
                with_min_and_max:
                  type: array
                  items:
                    type: string
                  minItems: 2
                  maxItems: 5
                with_unique:
                  type: array
                  items:
                    type: string
                  uniqueItems: true
      responses:
        '200':
          description: OK