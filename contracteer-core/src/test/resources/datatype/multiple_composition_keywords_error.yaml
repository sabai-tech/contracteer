openapi: 3.0.0
info:
  title: Test API
  version: '1.0'
servers:
  - url: 'http://localhost:3000'
paths:
  /test:
    get:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prop1:
                  allOf:
                    - type: object
                      properties:
                        name:
                          type: string
                      required: [ "name" ]
                  oneOf:
                    - type: object
                      properties:
                        age:
                          type: integer
                    - type: object
                      properties:
                        email:
                          type: string
      responses:
        200:
          description: OK
