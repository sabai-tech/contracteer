openapi: 3.0.0
info:
  title: Path Parameter Invalid Styles
  version: '1.0'
paths:
  # Invalid: form style not supported for path parameters
  /invalid-form/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          style: form
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success

  # Invalid: spaceDelimited style not supported for path parameters
  /invalid-space-delimited/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          style: spaceDelimited
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success

  # Invalid: pipeDelimited style not supported for path parameters
  /invalid-pipe-delimited/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          style: pipeDelimited
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success

  # Invalid: deepObject style not supported for path parameters
  /invalid-deep-object/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          style: deepObject
          schema:
            type: object
            properties:
              color:
                type: string
      responses:
        '200':
          description: Success
