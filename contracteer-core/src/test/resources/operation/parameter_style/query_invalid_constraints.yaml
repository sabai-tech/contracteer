openapi: 3.0.0
info:
  title: Query Parameter Invalid Constraints Tests
  version: '1.0'
paths:
  # Invalid: deepObject with explode=false
  /deep-object-invalid-explode:
    get:
      parameters:
        - in: query
          name: filter
          style: deepObject
          explode: false
          schema:
            type: object
            properties:
              color:
                type: string
      responses:
        '200':
          description: Success

  # Invalid: deepObject with array
  /deep-object-invalid-array:
    get:
      parameters:
        - in: query
          name: status
          style: deepObject
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success

  # Invalid: spaceDelimited with object (only arrays allowed)
  /space-delimited-invalid-object:
    get:
      parameters:
        - in: query
          name: filter
          style: spaceDelimited
          schema:
            type: object
            properties:
              color:
                type: string
      responses:
        '200':
          description: Success

  # Invalid: pipeDelimited with object (only arrays allowed)
  /pipe-delimited-invalid-object:
    get:
      parameters:
        - in: query
          name: filter
          style: pipeDelimited
          schema:
            type: object
            properties:
              color:
                type: string
      responses:
        '200':
          description: Success

  # Invalid: spaceDelimited with explode=true
  /space-delimited-invalid-explode:
    get:
      parameters:
        - in: query
          name: status
          style: spaceDelimited
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success

  # Invalid: pipeDelimited with explode=true
  /pipe-delimited-invalid-explode:
    get:
      parameters:
        - in: query
          name: status
          style: pipeDelimited
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success
