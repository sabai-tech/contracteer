openapi: 3.0.0
info:
  title: Query Parameter Style Tests
  version: '1.0'
paths:
  # Default style (form, explode=true)
  /items:
    get:
      parameters:
        - in: query
          name: status
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success

  # Form style, explode=false
  /form-no-explode:
    get:
      parameters:
        - in: query
          name: status
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success

  # Form style, explode=true (explicit)
  /form-explode:
    get:
      parameters:
        - in: query
          name: status
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success

  # SpaceDelimited style
  /space-delimited:
    get:
      parameters:
        - in: query
          name: status
          style: spaceDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success

  # PipeDelimited style
  /pipe-delimited:
    get:
      parameters:
        - in: query
          name: status
          style: pipeDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success

  # DeepObject style with object
  /deep-object:
    get:
      parameters:
        - in: query
          name: filter
          style: deepObject
          explode: true
          schema:
            type: object
            properties:
              color:
                type: string
              size:
                type: integer
      responses:
        '200':
          description: Success
