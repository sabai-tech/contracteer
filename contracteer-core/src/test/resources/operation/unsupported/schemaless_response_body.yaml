openapi: 3.0.0
info:
  title: Schemaless Response Body Test
  version: '1.0'
paths:
  /null-schema:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json: {}

  /empty-schema:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {}
