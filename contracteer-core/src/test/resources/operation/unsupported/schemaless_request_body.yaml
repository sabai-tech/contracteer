openapi: 3.0.0
info:
  title: Schemaless Request Body Test
  version: '1.0'
paths:
  /null-schema:
    post:
      requestBody:
        content:
          application/json: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer

  /empty-schema:
    post:
      requestBody:
        content:
          application/json:
            schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
