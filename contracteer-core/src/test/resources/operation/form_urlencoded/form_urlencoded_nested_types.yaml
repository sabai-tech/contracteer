openapi: 3.0.0
info:
  title: Form URL Encoded Nested Types Test
  version: '1.0'
paths:
  /test:
    post:
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: object
                  properties:
                    city:
                      type: string
                tags:
                  type: array
                  items:
                    type: object
                    properties:
                      label:
                        type: string
      responses:
        '200':
          description: OK
