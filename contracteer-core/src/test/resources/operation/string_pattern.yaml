openapi: 3.0.0
info:
  title: Product API
  version: '1.0'
paths:
  /products:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  pattern: "^[A-Z]{2}-\\d{4}$"
                name:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer