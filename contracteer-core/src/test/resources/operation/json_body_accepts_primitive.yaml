openapi: 3.0.0
info:
  title: Product API
  version: '1.0'
servers:
  - url: 'http://localhost:3000'
paths:
  /products/name:
    get:
      responses:
        200:
          description: product name
          content:
            application/json:
              schema:
                type: string
  /products/count:
    get:
      responses:
        200:
          description: product count
          content:
            application/json:
              schema:
                type: integer
  /products/in-stock:
    get:
      responses:
        200:
          description: product availability
          content:
            application/json:
              schema:
                type: boolean