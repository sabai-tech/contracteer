openapi: 3.0.0
info:
  title: Product API
  version: '1.0'
servers:
  - url: 'http://localhost:3000'
paths:
  /products/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        example: 999
        examples:
          GET_DETAILS:
            value: 10
    get:
      responses:
        200:
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/product_details'
              example:
                id: 999
                name: Ignored
                quantity: 0
              examples:
                GET_DETAILS:
                  value:
                    id: 10
                    name: La Bouledogue
                    quantity: 5

components:
  schemas:
    product_details:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: integer
