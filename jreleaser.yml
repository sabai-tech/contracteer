project:
  name: contracteer
  description: The loyal guard of your API contracts.
  longDescription: |
    Contracteer verifies that your API implementation matches your OpenAPI specification
    and provides a mock server that behaves exactly as your spec defines. Your OpenAPI
    specification is the single source of truth -- Contracteer turns it into executable
    tests and a faithful mock.
  authors:
    - Christophe Amory
  license: GPL-3.0-only
  inceptionYear: "2024"
  tags:
    - kotlin
    - graalvm
    - cli
  links:
    homepage: https://github.com/sabai-tech/contracteer
    documentation: https://sabai-tech.github.io/contracteer
  languages:
    java:
      groupId: tech.sabai.contracteer
      version: "21"
      multiProject: true

deploy:
  maven:
    mavenCentral:
      contracteer:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        stagingRepositories:
          - build/staging-deploy
        applyMavenCentralRules: true

signing:
  active: ALWAYS
  armored: true
  artifacts: true

release:
  github:
    owner: sabai-tech
    name: contracteer
    tagName: '{{projectVersion}}'
    releaseName: '{{projectName}} {{projectVersion}}'
    overwrite: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      extraProperties:
        categorizeScopes: "true"
      hide:
        categories:
          - 'merge'
          - 'allcontributors'
        contributors:
          - 'GitHub'
          - 'allcontributors'
          - 'dependabot'

assemble:
  archive:
    contracteer:
      active: ALWAYS
      attachPlatform: true
      fileSets:
        - input: '.'
          includes:
            - 'LICENSE'
        - input: "contracteer-cli/build/native/nativeCompile"
          output: 'bin'
          includes: [ 'contracteer', 'contracteer.exe' ]

matrix:
  rows:
    - { platform: linux-aarch_64 }
    - { platform: linux-x86_64 }
    - { platform: osx-aarch_64 }
    - { platform: osx-x86_64 }
    - { platform: windows-x86_64 }

distributions:
  contracteer:
    executable:
      windowsExtension: exe
    applyDefaultMatrix: true
    artifactPattern:
      path: 'out/jreleaser/assemble/contracteer/archive/{{distributionName}}-{{projectVersion}}-{{matrix.platform}}.zip'

checksum:
  individual: true

packagers:
  brew:
    active: ALWAYS
    commitAuthor:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    repository:
      owner: sabai-tech
      name: homebrew-contracteer
      username: github-actions
    multiPlatform: true
    livecheck:
      - 'url "https://github.com/sabai-tech/contracteer/releases/latest"'
